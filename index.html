<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>htmlメモ</title>
    <link href="https://fonts.googleapis.com/css2?family=Sawarabi+Mincho&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        body {
            font-family: "Sawarabi Mincho", serif;
            font-size: 16px; 
            line-height: 1.2;
            padding: 10px;
            margin: 0;
        }

        .controls {
            margin-bottom: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }

        input[type="button"] {
            padding: 10px 15px;
            font-size: 14px;
            cursor: pointer;
            border: 1px solid #ccc;
            background: #eee;
            border-radius: 4px;
/*            font-family: "Sawarabi Mincho", serif;*/
        }

        #pagetitle {
            width: 100%;
            box-sizing: border-box;
            padding: 8px;
            font-size: 16px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            font-family: "Sawarabi Mincho", serif;
        }

        #textarea {
            outline: none;
            width: 100%;
            min-height: 400px;
            padding: 10px 0;
            box-sizing: border-box;
            background-color: #fff;
            border: none;
            font-size: 18px;
            white-space: pre-wrap;
            word-break: break-all;
            overflow-wrap: break-word;
/*            font-family: "Sawarabi Mincho", serif;*/
        }

        #textarea img {
            max-width: 100%;
            height: auto;
        }
    </style>
</head>

<body>
    <div class="controls">
        <input type="button" value="HTML出力" onclick="exportHTML();"/>
        <input type="button" value="PDF出力" onclick="exportPDF();"/>
        <input type="button" value="画像出力(PNG)" onclick="exportImage();"/>
        <input type="button" value="全消去" onclick="localStrageClear();"/>
    </div>

    <hr>
    <label style="font-size: 12px; color: #666;">保存ファイル名：</label><br>
    <input type="text" id="pagetitle" value="MyNote">

    <hr>
    <div id="textarea" contentEditable="true"></div>

    <script type="text/javascript">
        const editor = document.getElementById('textarea');
        const titleInput = document.getElementById('pagetitle');

        window.addEventListener('load', function(){
            const textvalue = localStorage.getItem('text');
            if(!editor.innerHTML.trim()){
                if (textvalue) {
                    editor.innerHTML = textvalue;
                } else {
                    editor.innerHTML = "ここに内容を入力してください。";
                }
            }
        });

        window.addEventListener('beforeunload', function() {
            localStorage.setItem('text', editor.innerHTML);
        });
     
        function exportHTML(){
            const htmlContent = "<!DOCTYPE html>\n" + document.documentElement.outerHTML;
            const blob = new Blob([htmlContent], { "type" : "text/html" });
            saveFile(URL.createObjectURL(blob), titleInput.value + ".html");
        }

        function exportPDF() {
            const opt = {
                margin:       10,
                filename:     titleInput.value + '.pdf',
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, useCORS: true },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(editor).save();
        }

        function exportImage() {
            html2canvas(editor, {
                useCORS: true,
                backgroundColor: "#ffffff"
            }).then(canvas => {
                saveFile(canvas.toDataURL("image/png"), titleInput.value + ".png");
            });
        }

        function saveFile(url, filename) {
            let link = document.createElement('a'); 
            link.href = url;
            link.download = filename;
            link.click();
        }

        function localStrageClear(){
            if(confirm("データを消去しますか？")){
                localStorage.removeItem('text');
                editor.innerHTML = "";
            }
        }

        document.addEventListener('paste', function (e) {
            setTimeout(() => {
                const images = editor.querySelectorAll('img');
                images.forEach(img => {
                    if (!img.style.width && !img.getAttribute('width')) {
                        img.style.maxWidth = "100%"; 
                    }
                });
            }, 10);
        });
    </script>
</body>
</html>
